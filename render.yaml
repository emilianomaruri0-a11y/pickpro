services:
  - type: web
    name: pickpro
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: true
      - key: ODDS_REGIONS
        value: us
      - key: ODDS_MARKETS
        value: h2h
      - key: SPORT_KEYS
        value: baseball_mlb,soccer_fifa_world_cup
      - key: POLL_INTERVAL_MS
        value: 10800000
      - key: LIVE_TICK_INTERVAL_MS
        value: 1000
      - key: EVENT_CACHE_TTL_HOURS
        value: 36
      - key: SESSION_TTL_HOURS
        value: 12
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_KV_TABLE
        value: pickpro_kv
      - key: THE_ODDS_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
